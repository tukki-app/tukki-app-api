name: CD

on:
  push:
    branches: [main]
    tags:
      - 'v*.*.*'

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: '20'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  DEPLOY_PATH: /opt/covoiturage
  APP_PORT: '3004'
  DOMAIN: covoiturage.backnd-api.cloud

jobs:
  # ─── Job 1: Publish Docker Image ─────────────────────────────────────────────
  publish:
    name: Publish Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
      image-tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          target: runner
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Job 2: Deploy to VPS ────────────────────────────────────────────────────
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: publish
    environment:
      name: production
      url: https://covoiturage.backnd-api.cloud

    steps:
      - uses: actions/checkout@v4

      - name: Copy compose file to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: docker-compose.prod.yml
          target: ${{ env.DEPLOY_PATH }}

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          IMAGE_TAG: ${{ needs.publish.outputs.image-tag }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PROD_DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
          PROD_JWT_SECRET: ${{ secrets.PROD_JWT_SECRET }}
          PROD_POSTGRES_DB: ${{ secrets.PROD_POSTGRES_DB }}
          PROD_POSTGRES_USER: ${{ secrets.PROD_POSTGRES_USER }}
          PROD_POSTGRES_PASSWORD: ${{ secrets.PROD_POSTGRES_PASSWORD }}
          DEPLOY_PATH: ${{ env.DEPLOY_PATH }}
          APP_PORT: ${{ env.APP_PORT }}
          DOMAIN: ${{ env.DOMAIN }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: GITHUB_REPOSITORY,IMAGE_TAG,GITHUB_ACTOR,GITHUB_TOKEN,PROD_DATABASE_URL,PROD_JWT_SECRET,PROD_POSTGRES_DB,PROD_POSTGRES_USER,PROD_POSTGRES_PASSWORD,DEPLOY_PATH,APP_PORT,DOMAIN
          script: |
            set -e
            mkdir -p "$DEPLOY_PATH"
            cd "$DEPLOY_PATH"

            # Écrire le .env
            printf 'GITHUB_REPOSITORY=%s\n' "$GITHUB_REPOSITORY" > .env
            printf 'IMAGE_TAG=%s\n' "$IMAGE_TAG" >> .env
            printf 'DATABASE_URL=%s\n' "$PROD_DATABASE_URL" >> .env
            printf 'JWT_SECRET=%s\n' "$PROD_JWT_SECRET" >> .env
            printf 'POSTGRES_DB=%s\n' "$PROD_POSTGRES_DB" >> .env
            printf 'POSTGRES_USER=%s\n' "$PROD_POSTGRES_USER" >> .env
            printf 'POSTGRES_PASSWORD=%s\n' "$PROD_POSTGRES_PASSWORD" >> .env
            printf 'APP_PORT=%s\n' "$APP_PORT" >> .env

            # Login GHCR
            echo "$GITHUB_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin

            # Pull nouvelle image
            docker compose -f docker-compose.prod.yml pull app

            # Migrations
            echo "==> Running migrations"
            docker compose -f docker-compose.prod.yml run --rm \
              -e DATABASE_URL="$PROD_DATABASE_URL" \
              app node -e "
                const { AppDataSource } = require('./dist/infrastructure/db/data-source');
                AppDataSource.initialize()
                  .then(() => AppDataSource.runMigrations())
                  .then(() => { console.log('Migrations OK'); process.exit(0); })
                  .catch(e => { console.error(e); process.exit(1); });
              "

            # Déploiement
            echo "==> Deploying"
            docker compose -f docker-compose.prod.yml up -d --no-deps --remove-orphans app

            # Config nginx si pas encore présente
            if [ ! -f /etc/nginx/sites-enabled/covoiturage ]; then
              echo "==> Creating nginx config"
              cat > /etc/nginx/sites-available/covoiturage << NGINX
            server {
                listen 80;
                server_name $DOMAIN;

                location / {
                    proxy_pass http://localhost:$APP_PORT;
                    proxy_http_version 1.1;
                    proxy_set_header Upgrade \$http_upgrade;
                    proxy_set_header Connection 'upgrade';
                    proxy_set_header Host \$host;
                    proxy_set_header X-Real-IP \$remote_addr;
                    proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto \$scheme;
                    proxy_cache_bypass \$http_upgrade;
                }
            }
            NGINX
              ln -sf /etc/nginx/sites-available/covoiturage /etc/nginx/sites-enabled/covoiturage
              nginx -t && nginx -s reload

              # SSL via Certbot
              certbot --nginx -d "$DOMAIN" --non-interactive --agree-tos \
                -m lifesonou@gmail.com --redirect
            fi

            # Health check
            echo "==> Waiting for health check"
            for i in $(seq 1 12); do
              if docker exec covoiturage-api wget -qO- http://localhost:3000/health >/dev/null 2>&1; then
                echo "OK after ${i}x5s"
                break
              fi
              if [ "$i" -eq 12 ]; then
                echo "Health check failed"
                exit 1
              fi
              sleep 5
            done

            docker image prune -f
            echo "==> Deployed successfully"
            docker compose -f docker-compose.prod.yml ps

      - name: Smoke test
        run: |
          sleep 15
          curl -f https://covoiturage.backnd-api.cloud/health --retry 3 --retry-delay 5

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Deployment FAILED"

  # ─── Job 3: GitHub Release (tags uniquement) ─────────────────────────────────
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [publish, deploy]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Deployed to https://covoiturage.backnd-api.cloud

            ### Docker Image
            ```
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.publish.outputs.image-tag }}
            ```
            Digest: `${{ needs.publish.outputs.image-digest }}`

            Swagger: https://covoiturage.backnd-api.cloud/api/docs
